name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format
      - run: npm audit --audit-level=high || echo "Audit warnings (non-blocking)"
      - run: npm test -- --coverage

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: ~/.expo
          key: expo-${{ hashFiles('**/package-lock.json') }}
          restore-keys: expo-
      - run: npm install
      - run: npm run build:web
        env:
          EXPO_NO_TELEMETRY: 1
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  e2e-playwright:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [web-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  ios-build:
    name: iOS Build Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx expo prebuild --platform ios --clean
      - name: Verify iOS project builds
        run: |
          cd ios
          xcodebuild -workspace HashWatch.xcworkspace -scheme HashWatch -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build | xcpretty

  deploy-web:
    name: Deploy Web
    if: github.ref == 'refs/heads/master' && !cancelled()
    needs: [backend, frontend, web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm install
      - name: Deploy to Hosting
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  verify-deploy:
    name: Verify Railway Deploy
    needs: [deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Railway deploy to be ready
        run: |
          COMMIT_SHA="${{ github.sha }}"
          for i in $(seq 1 10); do
            STATUS=$(curl -fsS https://hashwatch-production-5b6e.up.railway.app/api/health || true)
            HEALTH_OK=$(node -e "try{process.stdout.write((JSON.parse(require('fs').readFileSync(0,'utf8'))||{}).status==='ok'?'ok':'')}catch(e){process.stdout.write('')}" <<< "$STATUS")
            COMMIT=$(node -e "try{process.stdout.write((JSON.parse(require('fs').readFileSync(0,'utf8'))||{}).commitSha||'')}catch(e){process.stdout.write('')}" <<< "$STATUS")
            if [ "$HEALTH_OK" = "ok" ] && [ "$COMMIT" = "$COMMIT_SHA" ]; then
              echo "Deploy OK: $STATUS"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "Deploy not ready or commit mismatch after retries"
          exit 1

  web-lockfile:
    name: Web Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --coverage

  android-lockfile:
    name: Android Lockfile
    runs-on: ubuntu-latest
    needs: [web-lockfile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npx expo prebuild --platform android --clean
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  e2e-maestro:
    name: E2E (Maestro Cloud)
    if: github.ref == 'refs/heads/master'
    needs: [android-lockfile, android-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./
      - uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: app-debug.apk
          flow-path: .maestro/

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [android-lockfile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npx expo prebuild --platform android --clean
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk
