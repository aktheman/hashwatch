name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm install
      - run: npm run build
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm install
      - run: npm run typecheck
      - run: npm run lint
      - run: npm audit --audit-level=high || echo "Audit warnings (non-blocking)"
      - run: npm test -- --coverage

  web-build:
    name: Web Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: ~/.expo
          key: expo-${{ hashFiles('**/package-lock.json') }}
          restore-keys: expo-
      - run: npm install
      - run: npm run build:web
        env:
          EXPO_NO_TELEMETRY: 1
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  lighthouse:
    name: Lighthouse
    runs-on: ubuntu-latest
    needs: [web-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm install
      - name: Serve and run Lighthouse CI
        run: |
          npx serve dist -p 4173 &
          sleep 3
          npx lighthouse-ci autorun --config=lighthouserc.json

  e2e-playwright:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [web-build]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: hashwatch
          POSTGRES_USER: hashwatch
          POSTGRES_PASSWORD: hashwatch
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://hashwatch:hashwatch@localhost:5432/hashwatch
      JWT_SECRET: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm install
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Start backend
        working-directory: backend
        run: |
          node dist/index.js &
          sleep 3
          for i in $(seq 1 10); do
            STATUS=$(curl -s http://localhost:4000/api/health || echo '{}')
            if echo "$STATUS" | grep -q '"status":"ok"'; then
              echo "Backend ready!"
              break
            fi
            echo "Waiting for backend... attempt $i"
            sleep 2
          done
      - run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_API_URL: http://localhost:4000/api

  deploy-web:
    name: Deploy Web
    if: github.ref == 'refs/heads/master' && !cancelled() && !failure()
    needs: [backend, frontend, web-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm install
      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Vercel secrets not configured. Skipping deploy."
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel
        if: steps.check-secrets.outputs.has_secrets == 'true'
        run: npx vercel deploy --prebuilt --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  verify-deploy:
    name: Verify Railway Deploy
    if: github.ref == 'refs/heads/master' && !cancelled()
    needs: [deploy-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for Railway deploy to be ready
        run: |
          COMMIT_SHA="${{ github.sha }}"
          for i in $(seq 1 10); do
            STATUS=$(curl -fsS https://hashwatch-production-5b6e.up.railway.app/api/health || true)
            HEALTH_OK=$(node -e "try{process.stdout.write((JSON.parse(require('fs').readFileSync(0,'utf8'))||{}).status==='ok'?'ok':'')}catch(e){process.stdout.write('')}" <<< "$STATUS")
            COMMIT=$(node -e "try{process.stdout.write((JSON.parse(require('fs').readFileSync(0,'utf8'))||{}).commitSha||'')}catch(e){process.stdout.write('')}" <<< "$STATUS")
            if [ "$HEALTH_OK" = "ok" ] && [ "$COMMIT" = "$COMMIT_SHA" ]; then
              echo "Deploy OK: $STATUS"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "Deploy not ready or commit mismatch after retries"
          exit 1

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: npm ci
      - run: npx expo prebuild --platform android --clean
      - run: ./gradlew assembleDebug
        working-directory: android
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/*.apk

  ios-build:
    name: iOS Build Check
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx expo prebuild --platform ios --clean
      - name: Verify iOS project builds
        run: |
          cd ios
          xcodebuild -workspace HashWatch.xcworkspace -scheme HashWatch -configuration Debug -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' build | xcpretty

  e2e-maestro:
    name: E2E (Maestro Cloud)
    if: github.ref == 'refs/heads/master' && secrets.MAESTRO_CLOUD_API_KEY != ''
    needs: [android-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./
      - uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: app-debug.apk
          flow-path: .maestro/

  electron-build:
    name: Electron Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [web-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - run: npm install
      - name: Build Electron AppImage
        run: npx electron-builder --linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-appimage
          path: electron-dist/*.AppImage
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release upload ${{ github.ref_name }} electron-dist/*.AppImage --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
