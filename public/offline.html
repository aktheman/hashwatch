<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0A0A1A" />
  <title>HashWatch — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0A1A;
      color: #E0E0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      color: #FFFFFF;
      margin-bottom: 8px;
    }
    p {
      color: #9CA3AF;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #6C63FF;
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .cached-note {
      margin-top: 16px;
      color: #6B7280;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>HashWatch can't reach the network right now. Cached miner data may still be available.</p>
    <a class="btn" href="/" onclick="window.location.reload(); return false;">Try Again</a>
    <p class="cached-note">Your last known miner data is still accessible while offline.</p>
  </div>
</body>
</html>
